<!DOCTYPE html>

<html>
<head>
<title>Sign Up</title>

<style>
body {
  font-family: Arial;
  background: #0f0f1a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: #1c1c2e;
  padding: 20px;
  border-radius: 10px;
  width: 300px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  cursor: pointer;
}

#msg {
  margin-top: 10px;
  font-size: 14px;
}
</style>

</head>

<body>

<div class="box">
  <h2>Create Account</h2>

  <!-- ONLY USERNAME + PASSWORD -->

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>

  <div id="msg"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBDKED4gP_qjiUJFT8aJL4_Ydjqsx0oppM",
  authDomain: "ps99-trade-board.firebaseapp.com",
  projectId: "ps99-trade-board",
  storageBucket: "ps99-trade-board.firebasestorage.app",
  messagingSenderId: "983182657873",
  appId: "1:983182657873:web:9717c3dce90f97a5e86b70"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.signup = async function () {

  const username = document.getElementById("username").value.trim().toLowerCase();
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  if (!username || !password) {
    msg.innerText = "Fill all fields";
    return;
  }

  // check if username exists
  const ref = doc(db, "usernames", username);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    msg.innerText = "Username already taken";
    return;
  }

  // hidden email (NOT shown to user)
  const email = username + "@infrdomain.local";

  try {
    const userCred = await createUserWithEmailAndPassword(auth, email, password);

    await setDoc(ref, {
      username,
      uid: userCred.user.uid,
      email
    });

    localStorage.setItem("username", username);
    localStorage.setItem("uid", userCred.user.uid);

    msg.innerText = "Account created!";

    setTimeout(() => {
      window.location.href =
        "https://sites.google.com/view/infrdomain/home/log-in?authuser=0";
    }, 1000);

  } catch (e) {
    msg.innerText = e.message;
  }
};

</script>

</body>
</html>
